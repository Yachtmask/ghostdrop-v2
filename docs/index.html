<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GhostDrop Vault</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>GhostDrop 💀</h1>
<p>Decentralized Dead-Man Switch Vault</p>

<div class="card">

<h2>Create Vault</h2>

<input type="file" id="fileInput">

<input id="vaultName" placeholder="Vault Name">

<input id="timerDays" placeholder="Days before release">

<button onclick="createVault()">Create Vault</button>

<p id="status"></p>

</div>

<div class="card">

<h2>Check In</h2>

<input id="checkVaultName" placeholder="Vault Name">

<button onclick="checkin()">Check In</button>

</div>

<div class="card">

<h2>Your Vaults</h2>

<button onclick="loadVaults()">Refresh</button>

<ul id="vaultList"></ul>

</div>

<script src="app.js"></script>

</body>

</html>
