<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GhostDrop Vault</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>GhostDrop 💀</h1>
<p>Dead-man switch vault prototype</p>

<div class="card">

<h2>Encrypt File</h2>

<input type="file" id="fileInput">

<button onclick="encryptFile()">Encrypt File</button>

<p id="status"></p>

</div>

<div class="card">

<h2>Vault Actions</h2>

<input id="vaultId" placeholder="Vault ID">

<button onclick="createVault()">Create Vault</button>

<button onclick="checkin()">Check In</button>

</div>

<div class="card">

<h2>Vault List</h2>

<button onclick="loadVaults()">Refresh</button>

<ul id="vaultList"></ul>

</div>

<script src="app.js"></script>

</body>

</html>
